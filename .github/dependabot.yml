# =============================================================================
# Dependabot: automated dependency and GitHub Actions updates
# =============================================================================
# Purpose: Open PRs when new versions of pip dependencies and GitHub Actions
# are available. Replace "package-ecosystem" paths if your repo layout differs.
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# =============================================================================

version: 2
updates:
  # Pip: requirements files in the repo
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions: workflow files under .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
