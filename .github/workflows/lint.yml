# =============================================================================
# Lint workflow: Ruff lint and format checks (no autocorrect)
# =============================================================================
# Purpose: Enforce code style and lint rules. The workflow fails when
# violations are found; developers fix them locally. Lint level is
# configurable via config/lint-level.txt (minimal | standard | strict) or
# via manual run "Lint level" input. Path filters and concurrency as before.
# =============================================================================

name: Lint

on:
  push:
    branches: [main, master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".ruff.toml"
      - "config/lint-level.txt"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".ruff.toml"
      - "config/lint-level.txt"
      - ".github/workflows/lint.yml"
  workflow_dispatch:
    inputs:
      lint_level:
        description: "Lint level (blank = use config/lint-level.txt)"
        required: false
        default: "standard"
        type: choice
        options:
          - minimal
          - standard
          - strict

jobs:
  lint:
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve lint level
        id: lint-level
        run: |
          if [ -n "${{ github.event.inputs.lint_level }}" ]; then
            echo "level=${{ github.event.inputs.lint_level }}" >> $GITHUB_OUTPUT
          else
            LEVEL=$(cat config/lint-level.txt 2>/dev/null | head -1 | tr -d '[:space:]' || true)
            echo "level=${LEVEL:-standard}" >> $GITHUB_OUTPUT
          fi
          echo "Resolved lint level: $(grep '^level=' $GITHUB_OUTPUT | cut -d= -f2-)"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ hashFiles('requirements/base.txt') }}

      - name: Cache Ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: lint-ruff-${{ hashFiles('pyproject.toml', '**/*.py') }}

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      # -----------------------------------------------------------------------
      # Ruff check: level from config or input. minimal=E9,F; standard=pyproject; strict=standard+PLR,PLE,TRY
      # -----------------------------------------------------------------------
      - name: Run Ruff check
        id: ruff-check
        run: |
          LEVEL="${{ steps.lint-level.outputs.level }}"
          case "$LEVEL" in
            minimal)  RUFF_SELECT="E9,F" ; RUFF_IGNORE="" ;;
            strict)   RUFF_SELECT="E4,E7,E9,F,N8,B018,B019,ERA001,PLR0915,PLR,PLE,TRY" ; RUFF_IGNORE="" ;;
            *)        RUFF_SELECT="" ; RUFF_IGNORE="" ;;  # standard: use pyproject.toml
          esac
          if [ -n "$RUFF_SELECT" ]; then
            ruff check . --no-fix --output-format=github --select "$RUFF_SELECT" ${RUFF_IGNORE:+--ignore "$RUFF_IGNORE"}
          else
            ruff check . --no-fix --output-format=github
          fi
          echo "## Ruff check ($LEVEL)" >> $GITHUB_STEP_SUMMARY
          echo "Lint completed (no-fix mode)." >> $GITHUB_STEP_SUMMARY

      - name: Run Ruff format check
        run: |
          ruff format --check .
          echo "## Ruff format check" >> $GITHUB_STEP_SUMMARY
          echo "Format check passed." >> $GITHUB_STEP_SUMMARY
