# =============================================================================
# CI workflow: tests with coverage, type checking (mypy)
# =============================================================================
# Purpose: On every relevant push/PR, run tests (pytest-cov) and mypy. Test
# profile is configurable via config/test-profile.txt (unit | integration | all)
# or via manual run "Test profile" input. Path filters and concurrency as before.
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "**.py"
      - "requirements/**"
      - "pyproject.toml"
      - "tests/**"
      - "config/test-profile.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "**.py"
      - "requirements/**"
      - "pyproject.toml"
      - "tests/**"
      - "config/test-profile.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      test_profile:
        description: "Test profile (overrides config/test-profile.txt for this run)"
        required: false
        default: "all"
        type: choice
        options:
          - unit
          - integration
          - all

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve test profile
        id: test-profile
        run: |
          if [ -n "${{ github.event.inputs.test_profile }}" ]; then
            echo "profile=${{ github.event.inputs.test_profile }}" >> $GITHUB_OUTPUT
          else
            PROFILE=$(cat config/test-profile.txt 2>/dev/null | head -1 | tr -d '[:space:]' || true)
            echo "profile=${PROFILE:-all}" >> $GITHUB_OUTPUT
          fi
          echo "Resolved test profile: $(grep '^profile=' $GITHUB_OUTPUT | cut -d= -f2-)"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ci-pip-${{ hashFiles('requirements/base.txt') }}

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      # -----------------------------------------------------------------------
      # Pytest: -m unit, -m integration, or no -m (all) per profile
      # -----------------------------------------------------------------------
      - name: Run tests with coverage
        run: |
          PROFILE="${{ steps.test-profile.outputs.profile }}"
          echo "::group::Pytest output ($PROFILE)"
          if [ "$PROFILE" = "all" ]; then
            pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml
          else
            pytest tests/ -v -m "$PROFILE" --cov=src --cov-report=term-missing --cov-report=xml
          fi
          echo "::endgroup::"
          echo "## Test results ($PROFILE)" >> $GITHUB_STEP_SUMMARY
          echo "Pytest with coverage completed." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ci-pip-${{ hashFiles('requirements/base.txt') }}

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Run mypy
        run: |
          echo "::group::Mypy output"
          mypy src/
          echo "::endgroup::"
          echo "## Type check (mypy)" >> $GITHUB_STEP_SUMMARY
          echo "Mypy completed." >> $GITHUB_STEP_SUMMARY
